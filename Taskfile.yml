version: "3"

#
# sub namespace: https://taskfile.dev/#/usage?id=including-other-taskfiles
#
includes:
  mojo:
    aliases: [ "m101", "m" ]
    taskfile: packages/mojo-101
    dir: packages/mojo-101
    optional: true

  ffi:
    aliases: [ "ffi" ]
    taskfile: packages/mojo-ffi
    dir: packages/mojo-ffi
    optional: true

  import:
    aliases: [ "im" ]
    taskfile: packages/mojo-import
    dir: packages/mojo-import
    optional: true

  try:
    aliases: [ "t" ]
    taskfile: packages/try
    dir: packages/try
    optional: true

#
# global vars: https://taskfile.dev/#/usage?id=variables
#
vars:
  VAR1: "some-var"

# global env:
env:
  ENV1: testing

# env file:
dotenv:
  - .env

################################################################################################

tasks:
  default:
    cmds:
      - echo "hello world"

  init:
    cmds:
      - cp .env.local .env
      - task: install
      - task: install:pkg

  setup:
    cmds:
      - echo "setup"
      - task: install

  install:
    aliases: [ "i" ]
    cmds:
      - task: install:magic

  install:tools:
    aliases: [ "i:t" ]
    cmds:
      - npx skills add modular/skills

  install:magic:
    aliases: [ "ipm", "ipkg" ]
    cmds:
      - curl -ssL https://magic.modular.com/70e02269-abfd-4ed6-aac8-fc2b7d61b954
        | bash

  run:
    aliases: [ "r" ]
    cmds:
      - pixi run mojo hello.mojo
    dir: src/

  fmt:
    cmds:
      - magic run mojo format -l 120

  ################################################################################

  new:
    aliases: [ "n" ]
    cmds:
      - |
        pixi init {{.CLI_ARGS}} \
          -c https://conda.modular.com/max-nightly/ -c conda-forge \
          && cd {{.CLI_ARGS}} \
          pixi add mojo

  ################################################################################

  count:
    cmds:
      - tokei # 代码统计: https://github.com/XAMPPRocky/tokei

  quick:
    aliases: [ "q" ]
    cmds:
      - task: cc
      - task: push

  # usage: task rc -- 2
  rc:
    aliases: [ "reset:commit" ]
    cmds:
      - git reset --soft HEAD~{{.CLI_ARGS}}
      - task: c

  cc:
    cmds:
      - task: commit
      - task: commit

  commit:
    aliases: [ "c" ]
    cmds:
      - git add .
      - git status
      - |
        git commit -m 'chore: 💪 update' --no-verify
    ignore_error: true

  commit:ai:
    aliases: [ "c:ai" ]
    cmds:
      - git add .
      - git status
      - |
        git commit -m 'chore: 🤖 update' --no-verify
    ignore_error: true

  pull:
    cmds:
      - git config pull.rebase false
      - git pull origin main

  push:
    cmds:
      - git push origin main --tags
      - repo_url=`git remote -v | grep push | awk -F ":" '{print $2}' | awk -F
        ".git" '{print "https://github.com/"$1}'`; open $repo_url
